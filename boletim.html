  <header><h1>Cidade Real • Boletim de Ocorrências</h1></header>

  <div class="container">
    <section class="screen">
      <h1>Boletim de Ocorrências</h1>
      <input type="text" id="tipo" placeholder="Tipo de Ocorrência" />
      <input type="text" id="local" placeholder="Local / Linha" />
      <textarea id="desc" placeholder="Descrição da ocorrência" rows="5"></textarea>
      
      <button onclick="registrar()" class="btn">Registrar Ocorrência</button>
      <button onclick="gerarPDF()" class="btn">Gerar PDF</button>
    </section>
  </div>

  <nav class="nav-bottom">

  </nav>

<script>
 function sairSistema() {
    if (confirm("Deseja realmente sair?")) {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
}

function voltarLogin() {
    sessionStorage.clear();
    window.location.href = "index.html";
}
</script>
